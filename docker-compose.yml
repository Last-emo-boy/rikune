# =============================================================================
# Auto-generated from plugin systemDeps.
# Plugins: 32 enabled | Features: angr, capa, dynamic-python, frida, gdb, ghidra, graphviz, jadx, qiling, retdec, rizin, upx, vol3, wine
# Regenerate: npm run docker:generate
# =============================================================================

name: rikune

services:
  mcp-server:
    image: rikune:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CAPA_RULES_VERSION: v9.3.1
        CAPA_VERSION: "9.3.1"
        DIE_VERSION: "3.10"
        DIE_RELEASE_CHANNEL: "3.10"
        UPX_VERSION: "5.1.1"
        RIZIN_VERSION: "0.8.2"
        RETDEC_VERSION: "5.0"
        ANGR_VERSION: "9.2.205"
        JADX_VERSION: "1.5.1"
    container_name: rikune
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=512m
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2'
        reservations:
          memory: 2G
    volumes:
      - ./samples:/samples:ro
      - "${RIKUNE_DATA_ROOT:-D:/Docker/rikune}/workspaces:/app/workspaces:rw"
      - "${RIKUNE_DATA_ROOT:-D:/Docker/rikune}/data:/app/data:rw"
      - "${RIKUNE_DATA_ROOT:-D:/Docker/rikune}/cache:/app/cache:rw"
      - "${RIKUNE_DATA_ROOT:-D:/Docker/rikune}/logs:/app/logs:rw"
      - "${RIKUNE_DATA_ROOT:-D:/Docker/rikune}/storage:/app/storage:rw"
      - "${RIKUNE_DATA_ROOT:-D:/Docker/rikune}/ghidra-projects:/ghidra-projects:rw"
      - "${RIKUNE_DATA_ROOT:-D:/Docker/rikune}/ghidra-logs:/ghidra-logs:rw"
      - "${RIKUNE_DATA_ROOT:-D:/Docker/rikune}/qiling-rootfs:/opt/qiling-rootfs:ro"
      - type: volume
        source: root-config
        target: /root/.rikune
    environment:
      - NODE_ENV=production
      - PYTHONUNBUFFERED=1
      - WORKSPACE_ROOT=/app/workspaces
      - DB_PATH=/app/data/database.db
      - CACHE_ROOT=/app/cache
      - AUDIT_LOG_PATH=/app/logs/audit.log
      - XDG_CONFIG_HOME=/app/logs/.config
      - XDG_CACHE_HOME=/app/cache/xdg
      - LOG_LEVEL=info
      - SANDBOX_PYTHON_PATH=/usr/local/bin/python3
      - JADX_PATH=/opt/jadx/bin/jadx
      - ANGR_PYTHON=/opt/angr-venv/bin/python
      - GRAPHVIZ_DOT_PATH=/usr/bin/dot
      - RIZIN_PATH=/opt/rizin/bin/rizin
      - UPX_PATH=/usr/local/bin/upx
      - RETDEC_PATH=/opt/retdec/bin/retdec-decompiler
      - QILING_PYTHON=/opt/qiling-venv/bin/python
      - WINE_PATH=/usr/bin/wine
      - GHIDRA_INSTALL_DIR=/opt/ghidra
      - CAPA_RULES_PATH=/opt/capa-rules
      - GHIDRA_PROJECT_ROOT=/ghidra-projects
      - GHIDRA_LOG_ROOT=/ghidra-logs
      - CAPA_PATH=/usr/local/bin/capa
      - DIE_PATH=/usr/bin/diec
      - RETDEC_INSTALL_DIR=/opt/retdec
      - VOLATILITY3_PATH=/usr/local/bin/vol
      - QILING_ROOTFS=/opt/qiling-rootfs
      - PANDA_PYTHON=/usr/local/bin/python3
      - YARAX_PYTHON=/usr/local/bin/python3
      # API File Server
      - API_ENABLED=true
      - API_PORT=18080
      # - API_KEY=your-secret-key-here
      - API_STORAGE_ROOT=/app/storage
      - API_MAX_FILE_SIZE=524288000
      - API_RETENTION_DAYS=30
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const r=http.get('http://localhost:18080/api/v1/health',res=>{process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.setTimeout(5000,()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ports:
      - "18080:18080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    labels:
      - "app=rikune"
      - "component=mcp-server"
      - "security.isolation=high"

volumes:
  root-config:
    driver: local
  storage:
    driver: local
  ghidra-projects:
    driver: local
  ghidra-logs:
    driver: local

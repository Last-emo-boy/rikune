# =============================================================================
# Docker Compose - Rikune Analyzer Only
# =============================================================================
# Lightweight deployment for the static-analysis-only Analyzer node.
# Use this on Linux hosts where you do NOT want to run samples locally.
# For dynamic analysis, switch to RUNTIME_MODE=manual or remote-sandbox and
# connect this analyzer to a Windows Runtime node or Host Agent.
# =============================================================================

name: rikune-analyzer

services:
  analyzer:
    image: rikune-analyzer:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.analyzer
      args:
        ANGR_VERSION: "9.2.205"
        CAPA_RULES_VERSION: "v9.3.1"
        CAPA_VERSION: "9.3.1"
        DIE_RELEASE_CHANNEL: "3.10"
        DIE_VERSION: "3.10"
        GHIDRA_VERSION: "12.0.4"
        GORESYM_VERSION: "3.3"
        JADX_VERSION: "1.5.1"
        RETDEC_VERSION: "5.0"
        RIZIN_VERSION: "0.8.2"
        UPX_VERSION: "5.1.1"
    container_name: rikune-analyzer
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=512m
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2'
        reservations:
          memory: 2G
    volumes:
      - ./samples:/samples:ro
      - "${RIKUNE_DATA_ROOT:-./data}/workspaces:/app/workspaces:rw"
      - "${RIKUNE_DATA_ROOT:-./data}/data:/app/data:rw"
      - "${RIKUNE_DATA_ROOT:-./data}/cache:/app/cache:rw"
      - "${RIKUNE_DATA_ROOT:-./data}/logs:/app/logs:rw"
      - "${RIKUNE_DATA_ROOT:-./data}/storage:/app/storage:rw"
      - "${RIKUNE_DATA_ROOT:-./data}/ghidra-projects:/ghidra-projects:rw"
      - "${RIKUNE_DATA_ROOT:-./data}/ghidra-logs:/ghidra-logs:rw"
      - type: volume
        source: root-config
        target: /root/.rikune
    environment:
      - NODE_ENV=production
      - NODE_ROLE=analyzer
      # Use 'disabled' for static-only analysis.
      # Switch to 'manual' only when you have a separate Windows Runtime node.
      - RUNTIME_MODE=disabled
      # - RUNTIME_ENDPOINT=http://host.docker.internal:18081
      # - RUNTIME_API_KEY=your-runtime-api-key
      - PYTHONUNBUFFERED=1
      - WORKSPACE_ROOT=/app/workspaces
      - DB_PATH=/app/data/database.db
      - CACHE_ROOT=/app/cache
      - AUDIT_LOG_PATH=/app/logs/audit.log
      - XDG_CONFIG_HOME=/app/logs/.config
      - XDG_CACHE_HOME=/app/cache/xdg
      - LOG_LEVEL=info
      - JADX_PATH=/opt/jadx/bin/jadx
      - ANGR_PYTHON=/opt/angr-venv/bin/python
      - APKTOOL_PATH=/usr/bin/apktool
      - DIEC_PATH=/usr/local/bin/diec
      - BINWALK_PATH=/usr/local/bin/binwalk
      - GHIDRA_INSTALL_DIR=/opt/ghidra
      - GORESYM_PATH=/usr/local/bin/GoReSym
      - GRAPHVIZ_DOT_PATH=/usr/bin/dot
      - CAPA_RULES_PATH=/opt/capa-rules
      - DOTNET_PATH=/usr/bin/dotnet
      - VOLATILITY3_PATH=/usr/local/bin/vol
      - TSHARK_PATH=/usr/bin/tshark
      - OSSLSIGNCODE_PATH=/usr/bin/osslsigncode
      - RETDEC_PATH=/opt/retdec/bin/retdec-decompiler
      - RIZIN_PATH=/opt/rizin/bin/rizin
      - DE4DOT_PATH=/opt/de4dot/de4dot
      - UPX_PATH=/usr/local/bin/upx
      - GHIDRA_PROJECT_ROOT=/ghidra-projects
      - GHIDRA_LOG_ROOT=/ghidra-logs
      - CAPA_PATH=/usr/local/bin/capa
      - DIE_PATH=/usr/bin/diec
      - RETDEC_INSTALL_DIR=/opt/retdec
      - YARAX_PYTHON=/usr/local/bin/python3
      # API File Server
      - API_ENABLED=true
      - API_PORT=18080
      # - API_KEY=your-secret-key-here
      - API_STORAGE_ROOT=/app/storage
      - API_MAX_FILE_SIZE=524288000
      - API_RETENTION_DAYS=30
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const r=http.get('http://localhost:18080/api/v1/health',res=>{process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.setTimeout(5000,()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ports:
      - "18080:18080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    labels:
      - "app=rikune"
      - "component=analyzer"
      - "security.isolation=high"

volumes:
  root-config:
    driver: local
